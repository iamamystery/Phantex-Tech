# Render Blueprint for the Phantex Tech Django backend.
# Connect this repo to Render as a Blueprint and it will create the web service
# and a managed PostgreSQL database, wiring DATABASE_URL automatically.
# Values marked `sync: false` must be filled in via the Render dashboard.

databases:
  - name: phantex-db
    databaseName: phantex
    plan: free          # bump to a paid plan for production durability/backups

services:
  - type: web
    name: phantex-backend
    runtime: python
    plan: free           # free web services sleep when idle; upgrade for always-on
    rootDir: backend     # repo is a monorepo; the Django project lives in backend/
    buildCommand: "./build.sh"
    startCommand: "gunicorn core.wsgi:application --bind 0.0.0.0:$PORT"
    healthCheckPath: /admin/login/
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: DJANGO_DEBUG
        value: "False"
      # Provided automatically by the managed database above.
      - key: DATABASE_URL
        fromDatabase:
          name: phantex-db
          property: connectionString
      # Auto-generated strong secret; no need to set it yourself.
      - key: SECRET_KEY
        generateValue: true
      # ---- Fill these in the dashboard (sync: false) -------------------------
      # Render injects RENDER_EXTERNAL_HOSTNAME, but ALLOWED_HOSTS is read as a
      # plain list, so set it explicitly to your service hostname.
      - key: ALLOWED_HOSTS
        sync: false      # e.g. phantex-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false      # e.g. https://frontend-murex-rho-51.vercel.app,https://phantextech.com
      - key: CSRF_TRUSTED_ORIGINS
        sync: false      # e.g. https://phantex-backend.onrender.com,https://frontend-murex-rho-51.vercel.app
      # Optional: allow Vercel preview URLs without listing each one.
      - key: CORS_ALLOWED_ORIGIN_REGEXES
        sync: false      # e.g. ^https://.*\.vercel\.app$
      # Optional first-deploy admin user (used by build.sh; remove after first deploy).
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
